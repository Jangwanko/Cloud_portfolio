events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    charset utf-8;
    charset_types text/html text/plain text/css application/javascript application/json;

    # Upstream groups allow seamless horizontal scaling later.
    upstream api_upstream {
        least_conn;
        server api:8000 max_fails=3 fail_timeout=10s;
    }

    upstream observer_upstream {
        least_conn;
        server observer:8081 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /observer/ {
            rewrite ^/observer/(.*)$ /$1 break;
            proxy_pass http://observer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
