events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    charset utf-8;
    charset_types text/html text/plain text/css application/javascript application/json;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            set $api_upstream http://api:8000;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /observer/ {
            set $observer_upstream http://observer:8081;
            rewrite ^/observer/(.*)$ /$1 break;
            proxy_pass $observer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
