architecture: replication
postgresql:
  replicaCount: 3
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql-repmgr
    tag: latest
  username: portfolio
  password: portfolio
  database: portfolio
  repmgrPassword: repmgr-secret
  pgHbaTrustAll: false
  syncReplication: true
  numSynchronousReplicas: 1
pgpool:
  replicaCount: 1
  image:
    registry: docker.io
    repository: bitnamilegacy/pgpool
    tag: latest
  adminUsername: admin
  adminPassword: admin-secret
persistence:
  enabled: true
  size: 8Gi
metrics:
  enabled: false
