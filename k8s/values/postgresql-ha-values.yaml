global:
  security:
    allowInsecureImages: true

postgresql:
  replicaCount: 3
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql-repmgr
    tag: 17.6.0-debian-12-r2
  username: portfolio
  password: portfolio
  database: portfolio
  repmgrPassword: repmgr-secret
  syncReplication: true
  numSynchronousReplicas: 1
  podAntiAffinityPreset: soft
  pdb:
    create: true
    minAvailable: 2

pgpool:
  replicaCount: 2
  image:
    registry: docker.io
    repository: bitnamilegacy/pgpool
    tag: 4.6.3-debian-12-r0
  adminUsername: admin
  adminPassword: admin-secret
  podAntiAffinityPreset: soft
  pdb:
    create: true
    minAvailable: 1
  numInitChildren: 64
  maxPool: 2
  childMaxConnections: 100
  reservedConnections: 4
  childLifeTime: 300
  clientIdleLimit: 60
  connectionLifeTime: 300
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 750m
      memory: 1Gi

persistence:
  enabled: true
  size: 8Gi

metrics:
  enabled: false
