apiVersion: v1
kind: Namespace
metadata:
  name: messaging-app
---
apiVersion: v1
kind: Secret
metadata:
  name: messaging-env
  namespace: messaging-app
type: Opaque
stringData:
  APP_ENV: "k8s-ha"
  DB_HOST: "messaging-postgresql-ha-pgpool.messaging-app.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "portfolio"
  DB_USER: "portfolio"
  DB_PASSWORD: "portfolio"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.messaging-app.svc.cluster.local:9092"
  KAFKA_INGRESS_TOPIC: "message-ingress"
  KAFKA_DLQ_TOPIC: "message-ingress-dlq"
  KAFKA_CONSUMER_GROUP: "message-worker"
  STARTUP_RETRIES: "30"
  STARTUP_RETRY_DELAY: "2"
  DB_POOL_MIN_CONN: "1"
  DB_POOL_MAX_CONN: "8"
  DB_CONNECT_TIMEOUT: "3"
  READINESS_DEGRADED_GRACE_SECONDS: "30"
  POSTGRES_MIN_READY_STANDBYS: "2"
  POSTGRES_MIN_SYNC_STANDBYS: "0"
  POSTGRES_REPLICATION_DELAY_DEGRADED_BYTES: "1048576"
  UVICORN_WORKERS: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: messaging-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: messaging-portfolio:local
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - python -m uvicorn portfolio.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: messaging-env
            - secretRef:
                name: messaging-runtime-secrets
          resources:
            requests:
              cpu: "300m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: messaging-app
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: messaging-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - localhost
      secretName: messaging-local-tls
  rules:
    - host: localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: messaging-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: messaging-portfolio:local
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "worker.main"]
          envFrom:
            - secretRef:
                name: messaging-env
            - secretRef:
                name: messaging-runtime-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "800m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: messaging-app
spec:
  selector:
    app: worker
  ports:
    - name: metrics
      port: 9101
      targetPort: 9101
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backups
  namespace: messaging-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-weekly-backup
  namespace: messaging-app
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: postgres-backup
              image: bitnamilegacy/postgresql-repmgr:17.6.0-debian-12-r2
              imagePullPolicy: IfNotPresent
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: messaging-postgresql-ha-postgresql
                      key: password
              command:
                - sh
                - -c
                - |
                  set -eu
                  timestamp="$(date +%Y%m%d-%H%M%S)"
                  output="/backups/postgres-${timestamp}.sql"
                  pg_dump -h messaging-postgresql-ha-pgpool -p 5432 -U portfolio -d portfolio > "$output"
                  find /backups -type f -name 'postgres-*.sql' | sort | head -n -8 | xargs -r rm -f
                  echo "Weekly PostgreSQL backup written to $output"
              volumeMounts:
                - name: postgres-backups
                  mountPath: /backups
          volumes:
            - name: postgres-backups
              persistentVolumeClaim:
                claimName: postgres-backups
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlq-replayer
  namespace: messaging-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlq-replayer
  template:
    metadata:
      labels:
        app: dlq-replayer
    spec:
      containers:
        - name: dlq-replayer
          image: messaging-portfolio:local
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "worker.dlq_replayer"]
          envFrom:
            - secretRef:
                name: messaging-env
            - secretRef:
                name: messaging-runtime-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: messaging-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      - job_name: api
        metrics_path: /metrics
        static_configs:
          - targets: ["api:8000"]
      - job_name: worker
        metrics_path: /metrics
        static_configs:
          - targets: ["worker:9101"]
      - job_name: kube-state-metrics
        metrics_path: /metrics
        static_configs:
          - targets: ["kube-state-metrics:8080"]
  alerts.yml: |
    groups:
      - name: messaging-critical
        rules:
          - alert: MessagingKafkaDown
            expr: messaging_health_status{job="api",component="kafka"} == 0
            labels:
              severity: critical
              service: messaging
          - alert: MessagingDbDown
            expr: messaging_health_status{job="api",component="db"} == 0
            labels:
              severity: critical
              service: messaging
      - name: messaging-warning
        rules:
          - alert: MessagingPostgresDegraded
            expr: |
              (
                messaging_postgres_standby_count{job="api"} <= 1
                or sum(messaging_postgres_replication_state_count{job="api",state!="streaming"}) > 0
                or messaging_postgres_replication_delay_bytes_max{job="api"} > 1048576
              )
            for: 30s
            labels:
              severity: warning
              service: messaging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: messaging-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.external-url=http://localhost/prometheus/
            - --web.route-prefix=/prometheus/
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: messaging-app
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: messaging-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - localhost
      secretName: messaging-local-tls
  rules:
    - host: localhost
      http:
        paths:
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: messaging-app
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090/prometheus
        isDefault: true
        editable: false
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: Messaging Portfolio
        orgId: 1
        folder: Messaging Portfolio
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
