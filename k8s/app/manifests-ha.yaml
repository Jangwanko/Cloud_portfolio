apiVersion: v1
kind: Namespace
metadata:
  name: messaging-app
---
apiVersion: v1
kind: Secret
metadata:
  name: messaging-env
  namespace: messaging-app
type: Opaque
stringData:
  APP_ENV: "k8s-ha"
  DB_HOST: "messaging-postgresql-ha-pgpool.messaging-app.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "portfolio"
  DB_USER: "portfolio"
  DB_PASSWORD: "portfolio"
  REDIS_HOST: "messaging-redis.messaging-app.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_SENTINEL_ENABLED: "true"
  REDIS_SENTINEL_MASTER: "mymaster"
  REDIS_SENTINEL_NODES: "messaging-redis-node-0.messaging-redis-headless.messaging-app.svc.cluster.local:26379,messaging-redis-node-1.messaging-redis-headless.messaging-app.svc.cluster.local:26379,messaging-redis-node-2.messaging-redis-headless.messaging-app.svc.cluster.local:26379"
  STARTUP_RETRIES: "30"
  STARTUP_RETRY_DELAY: "2"
  INGRESS_PARTITIONS: "8"
  DB_POOL_MIN_CONN: "1"
  DB_POOL_MAX_CONN: "8"
  DB_CONNECT_TIMEOUT: "3"
  REDIS_MAX_CONNECTIONS: "400"
  REDIS_SOCKET_CONNECT_TIMEOUT: "1"
  REDIS_SOCKET_TIMEOUT: "1"
  REDIS_HEALTH_CHECK_INTERVAL: "15"
  REDIS_MIN_READY_REPLICAS: "2"
  READINESS_DEGRADED_GRACE_SECONDS: "30"
  POSTGRES_MIN_READY_STANDBYS: "2"
  POSTGRES_MIN_SYNC_STANDBYS: "0"
  POSTGRES_REPLICATION_DELAY_DEGRADED_BYTES: "1048576"
  UVICORN_WORKERS: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: messaging-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: messaging-portfolio:local
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - python -m uvicorn portfolio.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: messaging-env
            - secretRef:
                name: messaging-runtime-secrets
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: messaging-redis
                  key: redis-password
          resources:
            requests:
              cpu: "300m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: messaging-app
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: messaging-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - localhost
      secretName: messaging-local-tls
  rules:
    - host: localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: messaging-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: messaging-portfolio:local
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "worker.main"]
          envFrom:
            - secretRef:
                name: messaging-env
            - secretRef:
                name: messaging-runtime-secrets
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: messaging-redis
                  key: redis-password
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "800m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: messaging-app
spec:
  selector:
    app: worker
  ports:
    - name: metrics
      port: 9101
      targetPort: 9101
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backups
  namespace: messaging-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-weekly-backup
  namespace: messaging-app
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: postgres-backup
              image: bitnamilegacy/postgresql-repmgr:17.6.0-debian-12-r2
              imagePullPolicy: IfNotPresent
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: messaging-postgresql-ha-postgresql
                      key: password
              command:
                - sh
                - -c
                - |
                  set -eu
                  timestamp="$(date +%Y%m%d-%H%M%S)"
                  output="/backups/postgres-${timestamp}.sql"
                  pg_dump -h messaging-postgresql-ha-pgpool -p 5432 -U portfolio -d portfolio > "$output"
                  find /backups -type f -name 'postgres-*.sql' | sort | head -n -8 | xargs -r rm -f
                  echo "Weekly PostgreSQL backup written to $output"
              volumeMounts:
                - name: postgres-backups
                  mountPath: /backups
          volumes:
            - name: postgres-backups
              persistentVolumeClaim:
                claimName: postgres-backups
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlq-replayer
  namespace: messaging-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlq-replayer
  template:
    metadata:
      labels:
        app: dlq-replayer
    spec:
      containers:
        - name: dlq-replayer
          image: messaging-portfolio:local
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "worker.dlq_replayer"]
          envFrom:
            - secretRef:
                name: messaging-env
            - secretRef:
                name: messaging-runtime-secrets
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: messaging-redis
                  key: redis-password
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: messaging-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      - job_name: api
        metrics_path: /metrics
        static_configs:
          - targets: ["api:8000"]
      - job_name: worker
        metrics_path: /metrics
        static_configs:
          - targets: ["worker:9101"]
  alerts.yml: |
    groups:
      - name: messaging-critical
        rules:
          - alert: MessagingRedisDown
            expr: messaging_health_status{job="api",component="redis"} == 0
            labels:
              severity: critical
              service: messaging
          - alert: MessagingDbDown
            expr: messaging_health_status{job="api",component="db"} == 0
            labels:
              severity: critical
              service: messaging
      - name: messaging-warning
        rules:
          - alert: MessagingRedisDegraded
            expr: |
              (
                messaging_redis_connected_replicas{job="api"} <= 1
                or min(messaging_redis_master_link_status{job="api"}) < 1
                or (
                  messaging_redis_sentinel_quorum_ok{job="api"} == 0
                  and messaging_redis_sentinel_master_ok{job="api"} == 1
                )
              )
            for: 30s
            labels:
              severity: warning
              service: messaging
          - alert: MessagingPostgresDegraded
            expr: |
              (
                messaging_postgres_standby_count{job="api"} <= 1
                or sum(messaging_postgres_replication_state_count{job="api",state!="streaming"}) > 0
                or messaging_postgres_replication_delay_bytes_max{job="api"} > 1048576
              )
            for: 30s
            labels:
              severity: warning
              service: messaging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: messaging-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.external-url=http://localhost/prometheus/
            - --web.route-prefix=/prometheus/
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: messaging-app
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: messaging-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - localhost
      secretName: messaging-local-tls
  rules:
    - host: localhost
      http:
        paths:
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: messaging-app
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090/prometheus
        isDefault: true
        editable: false
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: Messaging Portfolio
        orgId: 1
        folder: Messaging Portfolio
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: messaging-app
data:
  messaging-overview.json: |
    {
      "uid": "messaging-portfolio-overview",
      "title": "Messaging Portfolio Overview",
      "tags": ["messaging", "portfolio", "observability"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "5s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "DB Health",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 6},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "none", "textMode": "value"},
          "targets": [{"expr": "messaging_health_status{job=\"api\",component=\"db\"}", "refId": "A"}]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Redis Health",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 6},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "none", "textMode": "value"},
          "targets": [{"expr": "messaging_health_status{job=\"api\",component=\"redis\"}", "refId": "A"}]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Redis Connected Replicas",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 6},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "none", "textMode": "value"},
          "targets": [{"expr": "messaging_redis_connected_replicas{job=\"api\"}", "refId": "A"}]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "PostgreSQL Standbys",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 6},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "value", "graphMode": "none", "textMode": "value"},
          "targets": [{"expr": "messaging_postgres_standby_count{job=\"api\"}", "refId": "A"}]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "API Request Rate",
          "gridPos": {"x": 0, "y": 6, "w": 12, "h": 8},
          "targets": [{"expr": "sum(rate(messaging_api_requests_total[1m])) by (status)", "legendFormat": "{{status}}", "refId": "A"}]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "API Latency",
          "gridPos": {"x": 12, "y": 6, "w": 12, "h": 8},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum(rate(messaging_api_request_latency_seconds_bucket[1m])) by (le))", "legendFormat": "p95", "refId": "A"},
            {"expr": "histogram_quantile(0.99, sum(rate(messaging_api_request_latency_seconds_bucket[1m])) by (le))", "legendFormat": "p99", "refId": "B"}
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "description": "Per-second rate of events consumed and processed by workers. If no events were produced recently, this panel can show No data during normal idle periods.",
          "title": "Worker Throughput (events only)",
          "gridPos": {"x": 0, "y": 14, "w": 12, "h": 8},
          "targets": [{"expr": "sum(rate(messaging_worker_processed_total[1m])) by (result)", "legendFormat": "{{result}}", "refId": "A"}]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Queue Depth By Queue",
          "gridPos": {"x": 12, "y": 14, "w": 12, "h": 8},
          "targets": [{"expr": "sum by (queue) (messaging_queue_depth)", "legendFormat": "{{queue}}", "refId": "A"}]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Redis Topology Signals",
          "gridPos": {"x": 0, "y": 22, "w": 12, "h": 8},
          "targets": [
            {"expr": "messaging_redis_connected_replicas{job=\"api\"}", "legendFormat": "connected_replicas", "refId": "A"},
            {"expr": "messaging_redis_sentinel_master_ok{job=\"api\"}", "legendFormat": "sentinel_master_ok", "refId": "B"},
            {"expr": "messaging_redis_sentinel_quorum_ok{job=\"api\"}", "legendFormat": "sentinel_quorum_ok", "refId": "C"}
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Redis Replica Link Status",
          "gridPos": {"x": 12, "y": 22, "w": 12, "h": 8},
          "targets": [{"expr": "messaging_redis_master_link_status{job=\"api\"}", "legendFormat": "{{replica}}", "refId": "A"}]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "PostgreSQL Replication Capacity",
          "gridPos": {"x": 0, "y": 30, "w": 12, "h": 8},
          "targets": [
            {"expr": "messaging_postgres_standby_count{job=\"api\"}", "legendFormat": "standby_count", "refId": "A"},
            {"expr": "messaging_postgres_sync_standby_count{job=\"api\"}", "legendFormat": "sync_standby_count", "refId": "B"},
            {"expr": "messaging_postgres_is_primary{job=\"api\"}", "legendFormat": "primary_reachable", "refId": "C"}
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "PostgreSQL Replication Delay",
          "gridPos": {"x": 12, "y": 30, "w": 12, "h": 8},
          "targets": [{"expr": "messaging_postgres_replication_delay_bytes_max{job=\"api\"}", "legendFormat": "delay_bytes_max", "refId": "A"}]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "PostgreSQL Replication States",
          "gridPos": {"x": 0, "y": 38, "w": 12, "h": 8},
          "targets": [{"expr": "messaging_postgres_replication_state_count{job=\"api\"}", "legendFormat": "{{state}}", "refId": "A"}]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "DB Failure Reasons (15m)",
          "gridPos": {"x": 12, "y": 38, "w": 12, "h": 8},
          "targets": [{"expr": "sum by (reason) (increase(messaging_db_failure_total[15m]))", "legendFormat": "{{reason}}", "refId": "A"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: messaging-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: messaging-runtime-secrets
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: messaging-runtime-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-provisioning
            items:
              - key: datasource.yml
                path: datasource.yml
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-provisioning
            items:
              - key: dashboard.yml
                path: dashboard.yml
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: messaging-app
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: messaging-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - localhost
      secretName: messaging-local-tls
  rules:
    - host: localhost
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: messaging-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 3
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: messaging-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
