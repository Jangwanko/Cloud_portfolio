apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: messaging-portfolio
  namespace: argocd
spec:
  description: GitOps project for the messaging portfolio local HA environment
  sourceRepos:
    - "*"
  destinations:
    - namespace: messaging-app
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
