groups:
  - name: messaging-critical
    rules:
      - alert: MessagingKafkaDown
        expr: messaging_health_status{job="api",component="kafka"} == 0
        labels:
          severity: critical
          service: messaging
        annotations:
          summary: "Kafka unavailable"
          description: "Kafka bootstrap is unavailable, so event intake cannot append to the replicated event log."

      - alert: MessagingDbDown
        expr: messaging_health_status{job="api",component="db"} == 0
        labels:
          severity: critical
          service: messaging
        annotations:
          summary: "PostgreSQL primary unavailable"
          description: "Writable PostgreSQL primary is unavailable. Kafka intake may continue if the broker is reachable, but persistence is blocked until PostgreSQL recovers."

      - alert: MessagingApiHigh5xxRate
        expr: |
          (
            sum(rate(messaging_api_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(messaging_api_requests_total[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          service: messaging
        annotations:
          summary: "High API 5xx rate"
          description: "API 5xx ratio is above 5% for 5 minutes."

      - alert: MessagingApiP95LatencyCritical
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(messaging_api_request_latency_seconds_bucket[5m]))
          ) > 4
        for: 5m
        labels:
          severity: critical
          service: messaging
        annotations:
          summary: "API p95 latency critical"
          description: "API p95 latency is above 4 seconds for 5 minutes."

  - name: messaging-warning
    rules:
      - alert: MessagingPostgresDegraded
        expr: |
          (
            messaging_postgres_standby_count{job="api"} <= 1
            or sum(messaging_postgres_replication_state_count{job="api",state!="streaming"}) > 0
            or messaging_postgres_replication_delay_bytes_max{job="api"} > 1048576
          )
        for: 30s
        labels:
          severity: warning
          service: messaging
        annotations:
          summary: "PostgreSQL replication degraded"
          description: "PostgreSQL primary is still reachable, but standby count, replication state, or lag are outside the local demo ready-state target."

      - alert: MessagingWorkerUnhealthy
        expr: messaging_health_status{component="worker"} == 0
        for: 2m
        labels:
          severity: warning
          service: messaging
        annotations:
          summary: "Worker unhealthy"
          description: "Worker health status is down for over 2 minutes."

      - alert: MessagingWorkerFailureRateHigh
        expr: |
          (
            sum(rate(messaging_worker_processed_total{result="failure"}[5m]))
            /
            clamp_min(sum(rate(messaging_worker_processed_total[5m])), 1)
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          service: messaging
        annotations:
          summary: "Worker failure rate high"
          description: "Worker failure ratio is above 10% for 5 minutes."

      - alert: MessagingApiP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(messaging_api_request_latency_seconds_bucket[5m]))
          ) > 2
        for: 10m
        labels:
          severity: warning
          service: messaging
        annotations:
          summary: "API p95 latency high"
          description: "API p95 latency is above 2 seconds for 10 minutes."
