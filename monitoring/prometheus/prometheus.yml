global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9101"]

  - job_name: dlq-replayer
    metrics_path: /metrics
    static_configs:
      - targets: ["dlq-replayer:9102"]

  - job_name: kafka-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: kube-state-metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["kube-state-metrics:8080"]
